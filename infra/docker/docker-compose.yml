services:
  postgres:
    image: postgres:17-alpine
    container_name: agentic-room-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_room
      POSTGRES_USER: agentic_room
      POSTGRES_PASSWORD: agentic_room
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_room -d agentic_room"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agentic-room-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: agentic-room
      MINIO_ROOT_PASSWORD: agentic-room-secret
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
